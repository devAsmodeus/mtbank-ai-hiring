# Детерминированные compliance-стоп-фразы контакт-центра МТБанка.
# Владелец - compliance-офицер: правится без релиза (перезагрузка процесса).
# Контур ловит только ОДНОЗНАЧНЫЕ формулировки; тонкую семантику (отрицания,
# предостережения про пароль, дисклеймеры) оставляем LLM-контуру.
patterns:
  # между словами допускаем пунктуацию [\s,]+; отрицание «не гарантирует»
  # гасим lookbehind'ом, чтобы не ловить корректную оговорку
  - rule: Гарантия одобрения кредита
    severity: medium
    regex: '(?<!не\s)гарантиру[а-яё]*[\s,]+(?:[а-яё]+[\s,]+){0,3}?одобр|одобр[а-яё]*[\s,]+(?:[а-яё]+[\s,]+){0,2}?(?:гарантиру|стопроцентн)|стопроцентн[а-яё]*[\s,]+(?:[а-яё]+[\s,]+){0,2}?одобр'

  # CVV/CVC оператор не должен произносить вообще; «пароль» многозначен → LLM
  - rule: Запрос чувствительных данных карты
    severity: high
    regex: '\b(?:cvv|cvc)\b|полн\w*\s+номер\s+карты|пин[\s-]?код'

  # «код/пароль из СМС» с любыми словами между («код ПОДТВЕРЖДЕНИЯ из СМС»)
  - rule: Запрос кода из СМС
    severity: high
    regex: '(?:код|пароль)[а-яё]*(?:\s+[а-яё]+){0,3}?\s+из\s+(?:смс|sms)'

  - rule: Манипулятивное давление на клиента
    severity: medium
    regex: 'предложение\s+(?:сгорит|действует\s+только\s+сегодня|исчезнет)'
